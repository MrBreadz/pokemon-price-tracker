name: pokemon-monitor

on:
  schedule:
    # Tous les jours à 03:00 UTC (cron Actions = UTC, et peut être décalé de
    # quelques minutes en période de forte charge — c'est normal).
    - cron: "0 3 * * *"
  workflow_dispatch: {} # bouton "Run workflow" pour lancer à la main

# Le job a besoin d'écrire dans le repo (commit de data/prices.json)
permissions:
  contents: write

# Empêche deux exécutions de se chevaucher
concurrency:
  group: pokemon-monitor
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Récupérer les prix
        env:
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
        run: node scripts/monitor.js

      - name: Commit si changement
        run: |
          git config user.name "pokemon-monitor[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "Aucun changement de prix aujourd'hui."
          else
            git commit -m "chore(data): maj prix $(date -u +%Y-%m-%d)"
            git push
          fi
